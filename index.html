<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Page d'accueil</title>
</head>
<body>
    <div class="container">
        <h1>Bienvenue !</h1>
        <form id="nameForm">
            <label for="nameInput">Entrez votre prénom :</label>
            <input type="text" id="nameInput" required>
            <button type="submit">Valider</button>
        </form>
        <p id="errorMessage" class="error"></p>
    </div>
    <script>
        document.getElementById('nameForm').onsubmit = function(event) {
            event.preventDefault(); // Empêche l'envoi du formulaire
            const nameInput = document.getElementById('nameInput').value;

            if (nameInput.trim() === '') {
                document.getElementById('errorMessage').textContent = 'Veuillez saisir un prénom.';
            } else {
                localStorage.setItem('userName', nameInput);
                window.location.href = 'tasks.html'; // Rediriger vers la page des tâches
            }
        };
    </script>
</body>
</html>
