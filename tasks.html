<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Liste des tâches</title>
</head>
<body id="charger-les-taches">
    <div class="container">
        <div class="nav-bar">
            <h1>📋 Liste des tâches</h1>
            <a href="stats.html" class="btn btn-secondary">📊 Statistiques</a>
        </div>

        <ul id="taskList"></ul>
        <button onclick="getTasks()" class="btn btn-primary">Charger les tâches</button>

        <!-- Formulaire ajout de tâche -->
        <div class="add-task-box">
            <h2>➕ Ajouter une tâche</h2>
            <div class="form-row">
                <input type="text" id="newTaskText" placeholder="Titre de la tâche *" />
                <input type="text" id="newTaskTags" placeholder="Tags (ex: Dev, Design)" />
                <button onclick="addTask()" class="btn btn-primary">Ajouter</button>
            </div>
            <p id="addTaskError" class="error"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
